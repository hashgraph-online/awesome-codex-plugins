<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SolidWorks GPT Plugin</title>
  <desc id="desc">A stepped mechanical shaft changing into connected knowledge nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10233f"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f7fa"/>
      <stop offset="0.45" stop-color="#8da2b1"/>
      <stop offset="1" stop-color="#3f5568"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g stroke="#33e1c6" stroke-opacity=".09" stroke-width="2">
