    <path d="M70 46h94l28 18h76v48h-76l-28 18H70z" fill="url(#metal)" stroke="#dbe8ee" stroke-width="5" stroke-linejoin="round"/>
    <path d="M164 46v84M192 64v48M268 64v48" fill="none" stroke="#506b7f" stroke-width="4"/>
    <path d="M278 88h54M322 88l36-46M322 88l38 48M358 42l42 18M360 136l40-18" fill="none" stroke="#33e1c6" stroke-width="7" stroke-linecap="round"/>
    <g fill="#33e1c6" stroke="#c9fff7" stroke-width="4" filter="url(#glow)">
