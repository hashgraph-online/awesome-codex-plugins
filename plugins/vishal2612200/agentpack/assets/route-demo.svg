<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" aria-labelledby="title desc" role="img" viewBox="0 0 920 430"><title id="title">AgentPack route demo</title><desc id="desc">Terminal snapshot showing AgentPack routing an auth token expiry task to relevant files and tests.</desc><rect width="920" height="430" fill="#111827" rx="10"/><rect width="920" height="38" x="0" y="0" fill="#1f2937" rx="10"/><circle cx="22" cy="19" r="6" fill="#ef4444"/><circle cx="43" cy="19" r="6" fill="#f59e0b"/><circle cx="64" cy="19" r="6" fill="#22c55e"/><text x="88" y="24" fill="#d1d5db" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="13">agentpack route --task &quot;fix auth token expiry&quot;</text><g font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="16"><text x="28" y="72" fill="#9ca3af">$ agentpack route --task &quot;fix auth token expiry&quot;</text><text x="28" y="112" fill="#60a5fa">Task:</text><text x="28" y="138" fill="#e5e7eb">fix auth token expiry</text><text x="28" y="184" fill="#60a5fa">Relevant files:</text><text x="48" y="214" fill="#e5e7eb">- tests/test_auth.py</text><text x="48" y="242" fill="#e5e7eb">- src/app/auth.py</text><text x="48" y="270" fill="#e5e7eb">- src/app/users.py</text><text x="28" y="318" fill="#60a5fa">Suggested commands:</text><text x="48" y="348" fill="#e5e7eb">- pytest tests/test_auth.py -q</text><text x="28" y="392" fill="#34d399">Local. Read-only. No cloud indexing.</text></g></svg>