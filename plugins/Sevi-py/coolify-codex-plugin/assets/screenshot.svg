    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1280" height="720" rx="0" fill="url(#bg)"/>
  <path d="M0 520 C210 460 310 635 530 568 C720 510 835 385 1055 452 C1158 483 1225 470 1280 430 L1280 720 L0 720 Z" fill="#22304a" opacity="0.55"/>
