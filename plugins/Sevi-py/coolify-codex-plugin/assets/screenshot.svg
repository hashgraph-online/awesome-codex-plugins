<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Coolify plugin overview</title>
  <desc id="desc">A polished overview screen showing Coolify deployment controls, health, logs, and environment management.</desc>
  <defs>
