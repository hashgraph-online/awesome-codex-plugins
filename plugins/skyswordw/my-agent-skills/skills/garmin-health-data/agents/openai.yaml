interface:
  display_name: "Garmin Health Data"
  short_description: "Fetch Garmin health, running, recovery, and Coach-plan summaries safely."
  default_prompt: >
    Use $garmin-health-data when the user wants to build or run a Garmin Connect health-data workflow with python-garminconnect. Keep credentials, one-time verification codes, cookies, and tokens out of chat and repositories; store tokens outside the project, normally under ~/.garminconnect. Prefer lightweight summaries for stats, sleep, HRV, resting heart rate, stress, training readiness, training status, running activities, and Garmin Coach plans. For China-region accounts, use Garmin(is_cn=True), verify region-aware diauth.garmin.cn behavior, and use a documented portal-login workaround if the mobile two-factor flow gets stuck on mobile.integration.garmin.com. Use get_training_plans() for plan listing and get_adaptive_training_plan_by_id() for Garmin Coach/adaptive plans. Do not download FIT, GPX, or TCX files unless the user explicitly requests detailed activity analysis. Weekly reports should filter activities to the report range, include Coach-plan context when available, mark missing fields explicitly, and avoid medical diagnosis or aggressive training advice.
