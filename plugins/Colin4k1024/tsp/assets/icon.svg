<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F766E"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EEAD4"/>
      <stop offset="100%" style="stop-color:#99F6E4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Grid dots - representing team/skills network -->
  <circle cx="72" cy="72" r="6" fill="#5EEAD4" opacity="0.6"/>
  <circle cx="128" cy="72" r="6" fill="#5EEAD4" opacity="0.6"/>
  <circle cx="184" cy="72" r="6" fill="#5EEAD4" opacity="0.6"/>
  <circle cx="72" cy="128" r="6" fill="#5EEAD4" opacity="0.6"/>
  <circle cx="184" cy="128" r="6" fill="#5EEAD4" opacity="0.6"/>
  <circle cx="72" cy="184" r="6" fill="#5EEAD4" opacity="0.6"/>
  <circle cx="128" cy="184" r="6" fill="#5EEAD4" opacity="0.6"/>
  <circle cx="184" cy="184" r="6" fill="#5EEAD4" opacity="0.6"/>

  <!-- Center node - tech-lead hub -->
  <circle cx="128" cy="128" r="20" fill="url(#accent)"/>

  <!-- Connection lines from center to corners -->
  <line x1="128" y1="108" x2="72" y2="72" stroke="#5EEAD4" stroke-width="2" opacity="0.5"/>
  <line x1="128" y1="108" x2="128" y2="72" stroke="#5EEAD4" stroke-width="2" opacity="0.5"/>
  <line x1="128" y1="108" x2="184" y2="72" stroke="#5EEAD4" stroke-width="2" opacity="0.5"/>
  <line x1="108" y1="128" x2="72" y2="128" stroke="#5EEAD4" stroke-width="2" opacity="0.5"/>
  <line x1="148" y1="128" x2="184" y2="128" stroke="#5EEAD4" stroke-width="2" opacity="0.5"/>
  <line x1="128" y1="148" x2="72" y2="184" stroke="#5EEAD4" stroke-width="2" opacity="0.5"/>
  <line x1="128" y1="148" x2="128" y2="184" stroke="#5EEAD4" stroke-width="2" opacity="0.5"/>
  <line x1="128" y1="148" x2="184" y2="184" stroke="#5EEAD4" stroke-width="2" opacity="0.5"/>

  <!-- TSP text in center -->
  <text x="128" y="134" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#042F2E" text-anchor="middle" letter-spacing="1">TSP</text>
</svg>
